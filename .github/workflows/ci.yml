name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon build

      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: |
            universal/build/libs/ContentsDirector-*-all.jar
            launchwrapper/build/libs/ContentsDirector-launchwrapper-*-all.jar
            modlauncher/build/libs/ContentsDirector-modlauncher-*-all.jar
