name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            universal/build/libs/ContentsDirector-*-all.jar
            launchwrapper/build/libs/ContentsDirector-launchwrapper-*-all.jar
            modlauncher/build/libs/ContentsDirector-modlauncher-*-all.jar
          generate_release_notes: true

      # Uncomment after creating projects on CurseForge and Modrinth,
      # then add CURSEFORGE_TOKEN and MODRINTH_TOKEN to repository secrets.
